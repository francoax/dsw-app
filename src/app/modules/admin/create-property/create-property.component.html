<div class="collapse bg-base-200 collapse-dsw">
  <input type="checkbox" #formCollapse />
  <div class="collapse-title text-xl font-medium">
      {{formTitle}}
  </div>
  <div class="collapse-content">
      <form [formGroup]="propertyForm" (ngSubmit)="onSubmit(propertyForm)">
        <app-input [label]="'Capacidad'" [placeholder]="'Capacidad'" [required]="true" [inputControl]="capacity"></app-input>
        <app-input [label]="'Dirección'" [placeholder]="'Dirección'" [required]="true" [inputControl]="address"></app-input>
        <app-input [label]="'Precio'" [placeholder]="'Precio'" [required]="true" [inputControl]="price"></app-input>
        <app-input [label]="'Fecha'" [placeholder]="'Fecha'" [required]="true" [inputControl]="date" [type]="'date'"></app-input>
        <div class="mb-4">
          <div>
          <label>Localidad</label>
          </div>
          <select name="'Location'" class="select select-bordered w-full max-w-xs" [formControl]="location">
            <option *ngFor="let loca of localities" [value]="loca.id">{{loca.name}}</option>
          </select> 
        </div>
        <div class="mb-4">
          <div>
          <label>Propiedades</label>
          </div>
          <select name="'PropertyType'" class="select select-bordered w-full max-w-xs" [formControl]="propertyType">
            <option *ngFor="let propT of propertiesTypes" [value]="propT._id">{{propT.description}}</option>
          </select> 
        </div>

        <div class="flex flex-col mb-4">
          <label class="mb-1" for="file">Seleccione un archivo</label>
          <input class="input input-bordered w-full max-w-xs mb-4" type="file" id="file" (change)="onFileSelected($event)">  
        </div>

        <div>
          <app-button [type]="'submit'" [classType]="'primary'" >
            {{buttonContent}}
          </app-button>
          <app-button (click)="closeForm()" [type]="'button'" [classType]="'cancel'">
            Cancelar
          </app-button>
        </div>
      </form>
    </div>
</div>
<app-property-list [properties]="properties" (DeleteEvent)="onDelete($event)" (UpdateEvent)="onUpdate($event)"></app-property-list>
